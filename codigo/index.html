<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Implementación de Medición Inteligente AP 2026</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #334155;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: rgba(255, 255, 255, 0.1);
      --accent: #38bdf8;
      --f1: #3b82f6; 
      --f2: #10b981; 
      --f3: #f59e0b;
      --critical: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* HEADER & LAYOUT */
    header {
      padding: 1rem 2rem;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    h1 { margin: 0; font-size: 1.1rem; font-weight: 600; color: var(--accent); letter-spacing: -0.025em; }

    .main-container { padding: 1.5rem; max-width: 1800px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

    /* KPI CARDS */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .kpi-card { background: var(--card); padding: 1.25rem; border-radius: 12px; border: 1px solid var(--line); }
    .kpi-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .kpi-value { font-size: 1.75rem; font-weight: 700; color: var(--text); }
    .kpi-sub { font-size: 0.75rem; margin-top: 0.4rem; display: flex; align-items: center; gap: 0.5rem; }

    /* FILTERS */
    .filter-bar { background: var(--card2); padding: 1rem; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; }
    select { background: var(--bg); color: var(--text); border: 1px solid var(--line); padding: 0.5rem; border-radius: 6px; font-size: 0.85rem; outline: none; }
    
    /* GANTT AREA */
    .gantt-container { background: var(--card); border-radius: 12px; border: 1px solid var(--line); overflow: hidden; display: flex; flex-direction: column; }
    .gantt-scroll { overflow: auto; position: relative; max-height: 600px; }

    /* Tabla interna del Gantt */
    .gantt-table { display: flex; flex-direction: column; min-width: max-content; }
    .gantt-header { display: flex; background: var(--card2); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--line); }
    .gantt-row { display: flex; border-bottom: 1px solid var(--line); align-items: stretch; }
    
    .col-info { width: 350px; min-width: 350px; padding: 0.75rem 1rem; border-right: 1px solid var(--line); background: var(--card); position: sticky; left: 0; z-index: 5; }
    .col-timeline { flex-grow: 1; display: flex; position: relative; }

    .day-cell { width: 32px; min-width: 32px; border-right: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--muted); }
    
    .bar-task { position: absolute; height: 28px; top: 8px; border-radius: 6px; display: flex; align-items: center; padding: 0 8px; cursor: pointer; transition: transform 0.2s; z-index: 2; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
    .bar-task:hover { transform: scaleY(1.1); filter: brightness(1.1); }
    .bar-progress { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 5px 0 0 5px; background: rgba(255,255,255,0.25); pointer-events: none; }
    .bar-label { position: relative; font-size: 0.7rem; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); z-index: 3; }

    .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--critical); z-index: 4; pointer-events: none; }
    
    /* TOOLTIP */
    #tooltip { position: fixed; background: #020617; border: 1px solid var(--accent); padding: 1rem; border-radius: 8px; z-index: 1000; pointer-events: none; display: none; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); font-size: 0.85rem; width: 280px; }
  </style>
</head>

<body>

  <header>
    <h1>Implementación Medición Inteligente 2026</h1>
    <div id="todayLabel" style="font-size: 0.85rem; color: var(--muted);"></div>
  </header>

  <div class="main-container">
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Avance Real Total</div>
        <div id="kpi-real" class="kpi-value">0%</div>
        <div id="kpi-diff" class="kpi-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Actividades Terminadas</div>
        <div id="kpi-done" class="kpi-value">0/0</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Fase Actual</div>
        <div id="kpi-phase" class="kpi-value">-</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Días para el Cierre</div>
        <div id="kpi-days" class="kpi-value">0</div>
      </div>
    </div>

    <div class="filter-bar">
      <div style="font-size: 0.8rem; font-weight: 600; color: var(--accent);">FILTROS:</div>
      <select id="filter-fase"><option value="">Todas las Fases</option></select>
      <select id="filter-owner"><option value="">Todos los Owners</option></select>
      <select id="filter-estado"><option value="">Todos los Estados</option></select>
    </div>

    <div class="gantt-container">
      <div class="gantt-scroll" id="ganttScroll">
        <div class="gantt-table" id="ganttBody"></div>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>

  <script>
    // DATOS DE LA TABLA (INYECTADOS)
    const rawData = [
      { id: "R1-F1-01", reporte: "R1 - OBRAS PROVISIONALES Y PRELIMINARES", fase: "Fase 1", owner: "TECSUR", inicio: "2026-01-31", fin: "2026-04-06", estado: "En progreso", avance: 0.83 },
      { id: "R3-F3-02", reporte: "R2.1 - MONTAJE DE POSTES - MEDIA TENSIÓN", fase: "Fase 1", owner: "TECSUR", inicio: "2026-01-29", fin: "2026-03-30", estado: "En progreso", avance: 0.94 },
      { id: "R4-F2-02", reporte: "R2.2- MONTAJE DE ARMADOS MT", fase: "Fase 1", owner: "TECSUR", inicio: "2026-02-09", fin: "2026-03-10", estado: "En progreso", avance: 0.58 },
      { id: "R5-F2-03", reporte: "R2.3 - MONTAJE DE CONDUCTORES", fase: "Fase 1", owner: "TECSUR", inicio: "2026-02-18", fin: "2026-02-26", estado: "Terminado", avance: 1.00 },
      { id: "R6-F2-04", reporte: "R2.4 - INSTALACION DE PUESTA A TIERRA", fase: "Fase 1", owner: "TECSUR", inicio: "2026-02-05", fin: "2026-03-14", estado: "En progreso", avance: 0.75 },
      { id: "R7-F2-05", reporte: "R2.5 - TRABAJOS SUBTERRÁNEOS MT", fase: "Fase 1", owner: "TECSUR", inicio: "2026-01-16", fin: "2026-03-03", estado: "Terminado", avance: 1.00 },
      { id: "R7-F2-06", reporte: "R3.1 - TRABAJOS SUBTERRANEOS BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-02-19", fin: "2026-03-19", estado: "No iniciado", avance: 0.00 },
      { id: "R8-F3-07", reporte: "R3.2 - MONTAJE DE POSTES -BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-02-03", fin: "2026-03-22", estado: "En progreso", avance: 0.88 },
      { id: "R9-F1-02", reporte: "R3.3  - MONTAJE DE ARMADOS BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-02-19", fin: "2026-03-22", estado: "En progreso", avance: 0.64 },
      { id: "R10-F1-03", reporte: "R3.4  - MONTAJE DE CONDUCTORES BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-03-05", fin: "2026-03-24", estado: "No iniciado", avance: 0.00 },
      { id: "R11-F3-03", reporte: "R3.5  - INSTALACION DE PUESTA A TIERRA BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-03-09", fin: "2026-03-24", estado: "En progreso", avance: 0.35 },
      { id: "R11-F3-04", reporte: "R3.6  - INSTALACION DE EQUIPOS DE ALUMBRADO PUBLICO BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-03-10", fin: "2026-03-26", estado: "No iniciado", avance: 0.00 },
      { id: "R13-F3-05", reporte: "R3.7  - INSTALACION DE EMPALMES Y CONECTORES BT", fase: "Fase 2", owner: "TECSUR", inicio: "2026-03-13", fin: "2026-03-26", estado: "No iniciado", avance: 0.00 },
      { id: "R14-F3-06", reporte: "R3.8  - CONEXIÓN CAJA DE DISTRIBUCIÓN (LONCHERA)", fase: "Fase 2", owner: "TECSUR", inicio: "2026-03-20", fin: "2026-03-29", estado: "No iniciado", avance: 0.00 },
      { id: "R15-F3-07", reporte: "R4  - PRUEBAS ELÉCTRICAS Y ENTREGA", fase: "Fase 2", owner: "TECSUR", inicio: "2026-04-08", fin: "2026-04-08", estado: "No iniciado", avance: 0.00 }
    ];

    const DAY_W = 32;
    const TODAY = new Date("2026-03-04"); // Fecha de corte hoy

    function init() {
      populateFilters();
      render();
      document.querySelectorAll('select').forEach(s => s.addEventListener('change', render));
      document.getElementById('todayLabel').innerText = "Hoy: " + TODAY.toLocaleDateString();
    }

    function populateFilters() {
      const fFase = document.getElementById('filter-fase');
      const fOwner = document.getElementById('filter-owner');
      const fEstado = document.getElementById('filter-estado');

      [...new Set(rawData.map(d => d.fase))].forEach(v => fFase.add(new Option(v, v)));
      [...new Set(rawData.map(d => d.owner))].forEach(v => fOwner.add(new Option(v, v)));
      [...new Set(rawData.map(d => d.estado))].forEach(v => fEstado.add(new Option(v, v)));
    }

    function render() {
      const faseV = document.getElementById('filter-fase').value;
      const ownerV = document.getElementById('filter-owner').value;
      const estadoV = document.getElementById('filter-estado').value;

      const filtered = rawData.filter(d => 
        (!faseV || d.fase === faseV) &&
        (!ownerV || d.owner === ownerV) &&
        (!estadoV || d.estado === estadoV)
      );

      // Calcular KPIs
      const totalAvance = filtered.reduce((acc, d) => acc + d.avance, 0) / (filtered.length || 1);
      document.getElementById('kpi-real').innerText = `${(totalAvance * 100).toFixed(1)}%`;
      document.getElementById('kpi-done').innerText = `${filtered.filter(d => d.estado === 'Terminado').length}/${filtered.length}`;
      
      const lastDate = new Date(Math.max(...filtered.map(d => new Date(d.fin))));
      const diffDays = Math.ceil((lastDate - TODAY) / (1000 * 60 * 60 * 24));
      document.getElementById('kpi-days').innerText = diffDays > 0 ? diffDays : "Plazo Vencido";

      // Rango de fechas para el Gantt
      const minDate = new Date(Math.min(...rawData.map(d => new Date(d.inicio))));
      minDate.setDate(minDate.getDate() - 3);
      const maxDate = new Date(Math.max(...rawData.map(d => new Date(d.fin))));
      maxDate.setDate(maxDate.getDate() + 7);
      const totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));

      // Dibujar Gantt
      const body = document.getElementById('ganttBody');
      let html = `<div class="gantt-header"><div class="col-info">Actividad / Responsable</div><div class="col-timeline">`;
      for(let i=0; i<totalDays; i++) {
        let d = new Date(minDate); d.setDate(d.getDate()+i);
        html += `<div class="day-cell">${d.getDate()}/${d.getMonth()+1}</div>`;
      }
      html += `</div></div>`;

      filtered.forEach(task => {
        const start = new Date(task.inicio);
        const end = new Date(task.fin);
        const left = Math.ceil((start - minDate)/(1000*60*60*24)) * DAY_W;
        const width = (Math.ceil((end - start)/(1000*60*60*24)) + 1) * DAY_W;
        const color = task.fase === "Fase 1" ? "var(--f1)" : task.fase === "Fase 2" ? "var(--f2)" : "var(--f3)";

        html += `
          <div class="gantt-row">
            <div class="col-info">
              <div style="font-size:0.8rem; font-weight:600">${task.reporte}</div>
              <div style="font-size:0.7rem; color:var(--muted)">${task.id} | ${task.owner}</div>
            </div>
            <div class="col-timeline">
              <div class="bar-task" style="left:${left}px; width:${width}px; background:${color}44; border:1px solid ${color}"
                   onmouseenter="showTooltip(event, ${JSON.stringify(task)})" onmouseleave="hideTooltip()">
                <div class="bar-progress" style="width:${task.avance*100}%; background:${color}"></div>
                <div class="bar-label">${(task.avance*100).toFixed(0)}%</div>
              </div>
            </div>
          </div>
        `;
      });

      // Línea de Hoy
      const todayLeft = Math.ceil((TODAY - minDate)/(1000*60*60*24)) * DAY_W;
      html += `<div class="today-line" style="left: ${350 + todayLeft}px"></div>`;

      body.innerHTML = html;
    }

    const tt = document.getElementById('tooltip');
    function showTooltip(e, task) {
      tt.style.display = 'block';
      tt.innerHTML = `
        <div style="font-weight:700; color:var(--accent); margin-bottom:8px">${task.reporte}</div>
        <div style="display:flex; justify-content:space-between; margin-bottom:4px"><span>Estado:</span> <b>${task.estado}</b></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:4px"><span>Avance:</span> <b>${(task.avance*100).toFixed(0)}%</b></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:4px"><span>Inicio:</span> <span>${task.inicio}</span></div>
        <div style="display:flex; justify-content:space-between;"><span>Fin:</span> <span>${task.fin}</span></div>
        <div style="margin-top:8px; padding-top:8px; border-top:1px solid var(--line); font-size:0.7rem; color:var(--muted)">Responsable: ${task.owner}</div>
      `;
      moveTooltip(e);
    }
    function hideTooltip() { tt.style.display = 'none'; }
    function moveTooltip(e) {
      tt.style.left = (e.clientX + 15) + 'px';
      tt.style.top = (e.clientY + 15) + 'px';
    }
    window.onmousemove = (e) => { if(tt.style.display==='block') moveTooltip(e); };

    init();
  </script>
</body>
</html>
